name: Make Keystore

on:
  workflow_dispatch:

jobs:
  make:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore office.keystore \
            -alias officekey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass ahdrn0909 -keypass ahdrn0909 \
            -dname "CN=ahdrn, OU=ahdrn, O=ahdrn, L=Seoul, ST=Seoul, C=KR"

      - name: Convert keystore to base64
        run: |
          base64 -w 0 office.keystore > keystore_base64.txt
          echo "===== KEYSTORE BASE64 START ====="
          cat keystore_base64.txt
          echo ""
          echo "===== KEYSTORE BASE64 END ====="

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: office-keystore
          path: |
            office.keystore
            keystore_base64.txt
